# End-to-end toy-scale TABES experiment configuration.
seed: 0
device: cpu

tasks:
  arithmetic: {n_train: 9000, n_eval: 300, seed: 0}
  sudoku4: {n_eval: 300, n_clues: 6, seed: 0, holdout_frac: 0.3}

model:
  dim: 128
  n_heads: 4
  n_layers: 4
  attn_mode: split   # ActiveQueryAttention implementation

train:
  steps: 3000
  batch_size: 256
  lr: 3.0e-4
  warmup: 100
  log_every: 200

# Tuned on sudoku4 (see results/report.md): tight prefilter + mild penalty.
# A large lambda_ac/h_max inverts the score and forces uncertain commits early.
boe:
  n_candidates: 3
  tau: 0.5
  gamma: 1.0
  lambda_ac: 0.2
  h_max: 0.3
  rho: 1.0
  use_aqa: true
  use_tis: true

benchmark:
  samplers: [random, confidence, margin, entropy, boe]
  step_budgets: [2, 4, 8]
  ablation_steps: 8
  rhos: [0.125, 0.25, 0.5]
  eval_limit: 300
