<svg width="1100" height="600" viewBox="0 0 1100 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TABES pipeline diagram</title>
  <desc id="desc">Flow showing forward ASET, backward TIS, fusion, and sampling update.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f514b"/>
    </marker>
  </defs>
  <rect width="1100" height="600" fill="#fffaf2"/>
  <text x="70" y="70" font-family="Space Grotesk, sans-serif" font-size="36" fill="#1f2f2a">TABES at one denoising step t</text>

  <rect x="70" y="120" width="210" height="110" rx="14" fill="#f7f2e8" stroke="#d7ccb8"/>
  <text x="95" y="165" font-family="Space Grotesk, sans-serif" font-size="25" fill="#2b3b36">Current state</text>
  <text x="100" y="198" font-family="Literata, serif" font-size="23" fill="#42534d">x_t</text>

  <rect x="350" y="85" width="290" height="150" rx="16" fill="#ffe8e1" stroke="#f0bfb0"/>
  <text x="375" y="128" font-family="Space Grotesk, sans-serif" font-size="25" fill="#8d3622">Forward branch</text>
  <text x="375" y="160" font-family="Literata, serif" font-size="22" fill="#7f2f1d">Adaptive entropy steering</text>
  <text x="375" y="191" font-family="Literata, serif" font-size="21" fill="#7f2f1d">s_forward(x_t, t)</text>

  <rect x="350" y="300" width="290" height="180" rx="16" fill="#dff5f1" stroke="#b7e1d9"/>
  <text x="375" y="342" font-family="Space Grotesk, sans-serif" font-size="25" fill="#0f5f56">Backward branch</text>
  <text x="375" y="374" font-family="Literata, serif" font-size="22" fill="#18534b">Trajectory inversion</text>
  <text x="375" y="405" font-family="Literata, serif" font-size="22" fill="#18534b">sampling (TIS)</text>
  <text x="375" y="436" font-family="Literata, serif" font-size="21" fill="#18534b">s_backward(x_t, t)</text>

  <rect x="730" y="200" width="300" height="190" rx="18" fill="#f5f8ff" stroke="#c7d2ea"/>
  <text x="755" y="245" font-family="Space Grotesk, sans-serif" font-size="25" fill="#33476f">Guidance fusion</text>
  <text x="755" y="283" font-family="Literata, serif" font-size="20" fill="#3e4f72">s_TABES = alpha_t * s_forward</text>
  <text x="755" y="313" font-family="Literata, serif" font-size="20" fill="#3e4f72">+ beta_t * s_backward</text>
  <text x="755" y="343" font-family="Literata, serif" font-size="20" fill="#3e4f72">(anti-collapse schedule)</text>

  <rect x="730" y="445" width="300" height="105" rx="14" fill="#fff3dc" stroke="#e6cfa0"/>
  <text x="756" y="486" font-family="Space Grotesk, sans-serif" font-size="24" fill="#6f4b14">Sample update</text>
  <text x="756" y="516" font-family="Literata, serif" font-size="21" fill="#7d5d23">x_(t-1) <- x_t + s_TABES</text>

  <line x1="280" y1="175" x2="350" y2="160" stroke="#3f514b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="280" y1="175" x2="350" y2="390" stroke="#3f514b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="160" x2="730" y2="245" stroke="#3f514b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="390" x2="730" y2="313" stroke="#3f514b" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="880" y1="390" x2="880" y2="445" stroke="#3f514b" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
