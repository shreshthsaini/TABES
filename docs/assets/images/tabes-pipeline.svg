<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="'Segoe UI','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f0faf8"/><stop offset="100%" stop-color="#fff5e9"/></linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f6c62"/><stop offset="100%" stop-color="#0a4d46"/></linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d64d2f"/><stop offset="100%" stop-color="#b73d23"/></linearGradient>
    <linearGradient id="purpGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7c5cbf"/><stop offset="100%" stop-color="#5a3d9e"/></linearGradient>
    <filter id="shadow1"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.1"/></filter>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6z" fill="#0f6c62"/></marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6z" fill="#d64d2f"/></marker>
    <marker id="arrowGrey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6z" fill="#666"/></marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="340" rx="18" fill="url(#bg1)"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2f2a">TABES: Backward-on-Entropy (BoE) Steering Pipeline</text>

  <!-- Step 1: Masked input -->
  <rect x="30" y="60" width="140" height="80" rx="12" fill="#fff" stroke="#dccfb9" filter="url(#shadow1)"/>
  <text x="100" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2f2a">Masked Input x_t</text>
  <text x="100" y="104" text-anchor="middle" font-size="20">🟨🔳🟨🔳🔳🟨</text>
  <text x="100" y="128" text-anchor="middle" font-size="9" fill="#666">■ = [MASK]  ■ = token</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="100" x2="200" y2="100" stroke="#0f6c62" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- Step 2: Denoiser Forward -->
  <rect x="210" y="55" width="145" height="90" rx="12" fill="url(#tealGrad)" filter="url(#shadow1)"/>
  <text x="283" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">① Forward Pass</text>
  <text x="283" y="98" text-anchor="middle" font-size="10" fill="#d7f2ee">Denoiser D_θ(x_t, t)</text>
  <text x="283" y="115" text-anchor="middle" font-size="10" fill="#d7f2ee">→ π_i, H(π_i) ∀i∈M_t</text>
  <text x="283" y="132" text-anchor="middle" font-size="9" fill="#a8e0d6">predictions + entropies</text>

  <!-- Arrow 2 -->
  <line x1="355" y1="100" x2="385" y2="100" stroke="#0f6c62" stroke-width="2" marker-end="url(#arrowTeal)"/>

  <!-- Step 3: Candidate prefilter -->
  <rect x="395" y="55" width="140" height="90" rx="12" fill="#fff" stroke="#0f6c62" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="465" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#0f6c62">② Prefilter</text>
  <text x="465" y="96" text-anchor="middle" font-size="10" fill="#42534d">Top-r by confidence</text>
  <text x="465" y="112" text-anchor="middle" font-size="10" fill="#42534d">→ Candidate set C_t</text>
  <text x="465" y="128" text-anchor="middle" font-size="10" fill="#42534d">Active set A_t = C_t</text>

  <!-- Arrow 3 down -->
  <line x1="465" y1="145" x2="465" y2="175" stroke="#666" stroke-width="2" marker-end="url(#arrowGrey)"/>

  <!-- Step 4: Surrogate + Backward -->
  <rect x="365" y="180" width="200" height="95" rx="12" fill="url(#redGrad)" filter="url(#shadow1)"/>
  <text x="465" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">③ Surrogate + Backward</text>
  <text x="465" y="223" text-anchor="middle" font-size="10" fill="#ffe2d8">Inject soft embeddings ẽ_i</text>
  <text x="465" y="239" text-anchor="middle" font-size="10" fill="#ffe2d8">Forward at t-1 → H̃_{t-1}</text>
  <text x="465" y="255" text-anchor="middle" font-size="10" fill="#ffe2d8">Backward: g_i = ∇ H̃_{t-1}</text>
  <text x="465" y="268" text-anchor="middle" font-size="9" fill="#ffcabc">ActiveQueryAttention (sparse)</text>

  <!-- Arrow 4 right -->
  <line x1="565" y1="228" x2="610" y2="228" stroke="#d64d2f" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step 5: TIS Scoring -->
  <rect x="620" y="180" width="140" height="95" rx="12" fill="url(#purpGrad)" filter="url(#shadow1)"/>
  <text x="690" y="205" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">④ TIS Scoring</text>
  <text x="690" y="225" text-anchor="middle" font-size="10" fill="#e0d4f5">TIS_i = -⟨g_i, Δe_i⟩</text>
  <text x="690" y="243" text-anchor="middle" font-size="10" fill="#e0d4f5">Confidence gating: ĉ_i</text>
  <text x="690" y="261" text-anchor="middle" font-size="10" fill="#e0d4f5">Anti-collapse penalty</text>

  <!-- Arrow 5 down -->
  <line x1="690" y1="275" x2="690" y2="300" stroke="#666" stroke-width="2" marker-end="url(#arrowGrey)"/>

  <!-- Step 6: Unmask -->
  <rect x="620" y="300" width="140" height="35" rx="10" fill="#0f6c62" filter="url(#shadow1)"/>
  <text x="690" y="322" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">⑤ Unmask top-b → x_{t-1}</text>

  <!-- Feedback loop arrow -->
  <path d="M 620 318 Q 560 318 540 318 Q 50 318 50 200 Q 50 140 100 140" stroke="#999" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arrowGrey)"/>
  <text x="280" y="312" text-anchor="middle" font-size="9" fill="#888">repeat for t = T, T-1, …, 1</text>

  <!-- Key insight box -->
  <rect x="620" y="60" width="248" height="90" rx="12" fill="#fff" stroke="#e8a895" filter="url(#shadow1)"/>
  <text x="744" y="82" text-anchor="middle" font-size="10" font-weight="700" fill="#d64d2f">💡 KEY INSIGHT</text>
  <text x="744" y="98" text-anchor="middle" font-size="9.5" fill="#42534d">Instead of unmasking the most</text>
  <text x="744" y="112" text-anchor="middle" font-size="9.5" fill="#42534d">confident tokens, BoE picks tokens</text>
  <text x="744" y="126" text-anchor="middle" font-size="9.5" fill="#42534d">that most reduce FUTURE entropy</text>
  <text x="744" y="140" text-anchor="middle" font-size="9.5" fill="#42534d">via a single backward gradient signal.</text>
</svg>
