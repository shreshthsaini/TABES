<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="'Segoe UI','Helvetica Neue',sans-serif">
  <defs>
    <linearGradient id="bgLock" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff8f5"/><stop offset="100%" stop-color="#f0faf8"/></linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="800" height="320" rx="16" fill="url(#bgLock)"/>
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2f2a">Trajectory Lock-in: The Problem BoE Solves</text>

  <!-- LEFT: Greedy (bad) -->
  <rect x="20" y="45" width="370" height="260" rx="14" fill="#fff" stroke="#e8a895" stroke-width="1.5" filter="url(#sh)"/>
  <text x="205" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#d64d2f">❌ Greedy Local-Confidence Unmasking</text>

  <!-- timeline axis -->
  <line x1="60" y1="245" x2="360" y2="245" stroke="#ccc" stroke-width="1.5"/>
  <text x="210" y="262" text-anchor="middle" font-size="9" fill="#888">denoising step t → 1</text>

  <!-- Entropy curve (stays high, crashes, stays bad) -->
  <path d="M 70 120 Q 120 118, 140 115 Q 170 112, 190 108 Q 220 105, 240 130 Q 260 165, 280 190 Q 300 210, 340 230" stroke="#d64d2f" stroke-width="2.5" fill="none"/>
  <text x="70" y="108" font-size="9" fill="#d64d2f" font-weight="600">high entropy</text>

  <!-- Bad token marker -->
  <circle cx="195" cy="106" r="8" fill="#d64d2f" opacity="0.2"/>
  <circle cx="195" cy="106" r="4" fill="#d64d2f"/>
  <text x="195" y="96" text-anchor="middle" font-size="8.5" fill="#d64d2f" font-weight="600">wrong pivot</text>
  <text x="195" y="150" text-anchor="middle" font-size="8.5" fill="#888">easy tokens first</text>

  <!-- Lock-in annotation -->
  <rect x="250" y="152" width="100" height="32" rx="6" fill="#ffe2d8" stroke="#d64d2f"/>
  <text x="300" y="164" text-anchor="middle" font-size="8.5" fill="#d64d2f" font-weight="600">⚠ LOCK-IN</text>
  <text x="300" y="178" text-anchor="middle" font-size="8" fill="#d64d2f">can't recover</text>

  <!-- Greedy tokens strip -->
  <g transform="translate(60, 195)">
    <rect width="32" height="20" rx="4" fill="#0f6c62" opacity="0.7"/><text x="16" y="14" text-anchor="middle" font-size="8" fill="#fff">the</text>
    <rect x="36" width="32" height="20" rx="4" fill="#0f6c62" opacity="0.7"/><text x="52" y="14" text-anchor="middle" font-size="8" fill="#fff">is</text>
    <rect x="72" width="32" height="20" rx="4" fill="#0f6c62" opacity="0.7"/><text x="88" y="14" text-anchor="middle" font-size="8" fill="#fff">a</text>
    <rect x="108" width="32" height="20" rx="4" fill="#d64d2f" opacity="0.8"/><text x="124" y="14" text-anchor="middle" font-size="8" fill="#fff">7</text>
    <rect x="144" width="32" height="20" rx="4" fill="#d64d2f" opacity="0.5"/><text x="160" y="14" text-anchor="middle" font-size="8" fill="#fff">??</text>
    <rect x="180" width="32" height="20" rx="4" fill="#d64d2f" opacity="0.5"/><text x="196" y="14" text-anchor="middle" font-size="8" fill="#fff">??</text>
    <rect x="216" width="32" height="20" rx="4" fill="#aaa" opacity="0.5"/><text x="232" y="14" text-anchor="middle" font-size="8" fill="#fff">■</text>
  </g>
  <text x="210" y="285" text-anchor="middle" font-size="9" fill="#888">→ reveals easy tokens first, ignores pivots</text>

  <!-- RIGHT: BoE (good) -->
  <rect x="410" y="45" width="370" height="260" rx="14" fill="#fff" stroke="#8ecfc4" stroke-width="1.5" filter="url(#sh)"/>
  <text x="595" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#0f6c62">✅ BoE Steering (Ours)</text>

  <!-- timeline axis -->
  <line x1="450" y1="245" x2="750" y2="245" stroke="#ccc" stroke-width="1.5"/>
  <text x="600" y="262" text-anchor="middle" font-size="9" fill="#888">denoising step t → 1</text>

  <!-- Entropy curve (drops steadily) -->
  <path d="M 460 120 Q 490 110, 510 95 Q 540 80, 570 90 Q 590 82, 620 72 Q 660 85, 700 88 Q 720 84, 730 80" stroke="#0f6c62" stroke-width="2.5" fill="none"/>
  <text x="460" y="108" font-size="9" fill="#0f6c62" font-weight="600">entropy drops</text>

  <!-- Good pivot marker -->
  <circle cx="520" cy="92" r="8" fill="#0f6c62" opacity="0.2"/>
  <circle cx="520" cy="92" r="4" fill="#0f6c62"/>
  <text x="520" y="82" text-anchor="middle" font-size="8.5" fill="#0f6c62" font-weight="600">key pivot first!</text>

  <!-- Smooth descent annotation -->
  <rect x="630" y="104" width="110" height="32" rx="6" fill="#d7f2ee" stroke="#0f6c62"/>
  <text x="685" y="116" text-anchor="middle" font-size="8.5" fill="#0f6c62" font-weight="600">✓ Stable trajectory</text>
  <text x="685" y="130" text-anchor="middle" font-size="8" fill="#0f6c62">future H↓ maximized</text>

  <!-- BoE tokens strip -->
  <g transform="translate(450, 195)">
    <rect width="32" height="20" rx="4" fill="#0f6c62" opacity="0.9"/><text x="16" y="14" text-anchor="middle" font-size="8" fill="#fff">42</text>
    <rect x="36" width="32" height="20" rx="4" fill="#0f6c62" opacity="0.8"/><text x="52" y="14" text-anchor="middle" font-size="8" fill="#fff">sum</text>
    <rect x="72" width="32" height="20" rx="4" fill="#0f6c62" opacity="0.7"/><text x="88" y="14" text-anchor="middle" font-size="8" fill="#fff">the</text>
    <rect x="108" width="32" height="20" rx="4" fill="#0f6c62" opacity="0.7"/><text x="124" y="14" text-anchor="middle" font-size="8" fill="#fff">of</text>
    <rect x="144" width="32" height="20" rx="4" fill="#0f6c62" opacity="0.6"/><text x="160" y="14" text-anchor="middle" font-size="8" fill="#fff">is</text>
    <rect x="180" width="32" height="20" rx="4" fill="#0f6c62" opacity="0.5"/><text x="196" y="14" text-anchor="middle" font-size="8" fill="#fff">a</text>
    <rect x="216" width="32" height="20" rx="4" fill="#0f6c62" opacity="0.4"/><text x="232" y="14" text-anchor="middle" font-size="8" fill="#fff">84</text>
  </g>
  <text x="600" y="285" text-anchor="middle" font-size="9" fill="#888">→ reveals load-bearing pivots first by TIS score</text>

</svg>
