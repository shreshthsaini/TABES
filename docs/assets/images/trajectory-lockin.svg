<svg width="1100" height="560" viewBox="0 0 1100 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Trajectory lock-in in diffusion decoding</title>
  <desc id="desc">Comparison of early entropy collapse versus balanced uncertainty correction.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="100%" stop-color="#effaf7"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1100" height="560" fill="url(#bg)"/>
  <rect x="70" y="45" width="975" height="445" rx="18" fill="#fffdf8" stroke="#d9ccb3"/>

  <line x1="150" y1="430" x2="970" y2="430" stroke="#42534d" stroke-width="3"/>
  <line x1="150" y1="430" x2="150" y2="110" stroke="#42534d" stroke-width="3"/>

  <text x="985" y="442" font-family="Space Grotesk, sans-serif" font-size="21" fill="#42534d">Denoising step →</text>
  <text x="56" y="95" transform="rotate(-90 56,95)" font-family="Space Grotesk, sans-serif" font-size="21" fill="#42534d">Entropy</text>

  <polyline points="170,360 270,295 370,250 470,210 570,176 670,149 770,128 870,112 950,101" fill="none" stroke="#d64d2f" stroke-width="7" stroke-linecap="round"/>
  <text x="740" y="165" font-family="Space Grotesk, sans-serif" font-size="23" fill="#b43f27">Forward-only collapse</text>

  <polyline points="170,360 270,320 370,290 470,262 570,236 670,210 770,188 870,170 950,154" fill="none" stroke="#0f6c62" stroke-width="7" stroke-linecap="round"/>
  <text x="695" y="231" font-family="Space Grotesk, sans-serif" font-size="23" fill="#0f6c62">TABES balanced decay</text>

  <circle cx="370" cy="250" r="10" fill="#d64d2f"/>
  <circle cx="370" cy="290" r="10" fill="#0f6c62"/>

  <rect x="223" y="145" width="320" height="80" rx="12" fill="#ffe9e2" stroke="#efc3b4"/>
  <text x="243" y="177" font-family="Literata, serif" font-size="20" fill="#7f2f1d">Wrong early token gets reinforced,</text>
  <text x="243" y="202" font-family="Literata, serif" font-size="20" fill="#7f2f1d">later correction becomes hard.</text>

  <rect x="560" y="283" width="370" height="95" rx="12" fill="#e4f7f3" stroke="#bfe3dc"/>
  <text x="582" y="317" font-family="Literata, serif" font-size="20" fill="#18534b">Backward signal preserves recoverability,</text>
  <text x="582" y="342" font-family="Literata, serif" font-size="20" fill="#18534b">reducing lock-in risk.</text>
</svg>
