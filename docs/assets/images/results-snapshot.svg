<svg width="1100" height="590" viewBox="0 0 1100 590" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Reported gains summary</title>
  <desc id="desc">Bar chart with relative improvements from the TABES paper.</desc>
  <rect width="1100" height="590" fill="#fffbf5"/>

  <text x="70" y="70" font-family="Space Grotesk, sans-serif" font-size="36" fill="#1f2f2a">TABES Reported Relative Improvements</text>
  <text x="70" y="104" font-family="Literata, serif" font-size="22" fill="#42534d">Values summarized from the paper's experimental sections.</text>

  <line x1="120" y1="490" x2="980" y2="490" stroke="#52635d" stroke-width="3"/>
  <line x1="120" y1="150" x2="120" y2="490" stroke="#52635d" stroke-width="3"/>

  <g font-family="Space Grotesk, sans-serif" font-size="19" fill="#52635d">
    <text x="85" y="490">0</text>
    <text x="72" y="430">5</text>
    <text x="64" y="370">10</text>
    <text x="64" y="310">15</text>
    <text x="64" y="250">20</text>
  </g>

  <g>
    <rect x="190" y="315" width="140" height="175" rx="12" fill="#d64d2f"/>
    <rect x="380" y="308" width="140" height="182" rx="12" fill="#e4765e"/>
    <rect x="570" y="374" width="140" height="116" rx="12" fill="#0f6c62"/>
    <rect x="760" y="156" width="140" height="334" rx="12" fill="#2b8e84"/>
  </g>

  <g font-family="Space Grotesk, sans-serif" font-size="24" fill="#1f2f2a">
    <text x="217" y="304">+6.5%</text>
    <text x="407" y="297">+6.9%</text>
    <text x="597" y="363">+3.4%</text>
    <text x="780" y="145">+18.5%</text>
  </g>

  <g font-family="Literata, serif" font-size="20" fill="#42534d">
    <text x="175" y="530">Text completion</text>
    <text x="205" y="556">(MDM)</text>

    <text x="365" y="530">Text completion</text>
    <text x="390" y="556">(UMDM)</text>

    <text x="587" y="530">Code infilling</text>

    <text x="757" y="530">Protein sequence</text>
    <text x="792" y="556">design</text>
  </g>
</svg>
